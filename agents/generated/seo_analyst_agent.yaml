agent_name: seo_analyst_agent
allowed_tools:
- web_search
- filesystem_server
default_model: claude-sonnet-4-6
department: marketing
fallback_model: gpt-4o
mission: Analyze web content to evaluate search engine optimization effectiveness
  and identify areas for improvement across on-page and technical SEO dimensions.
  Generate optimized meta descriptions, title tags, and structured content recommendations
  to maximize search engine discoverability and click-through rates. Uncover keyword
  opportunities by researching search intent, competition, and relevance to align
  content strategy with audience demand. Score content quality based on established
  SEO best practices including readability, keyword density, internal linking, and
  semantic relevance. Provide actionable, prioritized recommendations to guide content
  strategy decisions and improve organic search performance over time.
retry_policy:
  backoff_seconds: 2
  max_attempts: 3
token_budget: 12000
version: '1.0'
